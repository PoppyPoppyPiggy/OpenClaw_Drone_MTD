# docker-compose.test-harness.yml — MIRAGE-UAS Test Harness
#
# Project  : MIRAGE-UAS
# Author   : DS Lab
# Created  : 2026-04-06
#
# [ROLE] Stub DVD images + attacker simulator + deception monitor
#        No real DVD images needed — builds from local Dockerfiles
#
# [사용법]
#   docker compose -f config/docker-compose.test-harness.yml up -d
#   docker compose -f config/docker-compose.test-harness.yml down
# ═══════════════════════════════════════════════════════════════

version: "3.9"

x-fcu: &fcu-base
  build:
    context: ..
    dockerfile: docker/Dockerfile.fcu-stub
  restart: "no"
  networks:
    test_net: {}
  mem_limit: 256m

x-cc: &cc-base
  build:
    context: ..
    dockerfile: docker/Dockerfile.cc-stub
  restart: "no"
  networks:
    test_net: {}
  mem_limit: 256m

services:

  # ═══ HONEY DRONE 01 ═══
  fcu-test-01:
    <<: *fcu-base
    container_name: fcu_test_01
    hostname: fcu-test-01
    networks:
      test_net:
        ipv4_address: "172.40.0.20"

  cc-test-01:
    <<: *cc-base
    container_name: cc_test_01
    hostname: cc-test-01
    networks:
      test_net:
        ipv4_address: "172.40.0.10"
    environment:
      - DRONE_ID=honey_01
      - ENGINE_HOST=${ENGINE_HOST:-}
      - ENGINE_PORT=14551
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      fcu-test-01:
        condition: service_healthy

  # ═══ HONEY DRONE 02 ═══
  fcu-test-02:
    <<: *fcu-base
    container_name: fcu_test_02
    hostname: fcu-test-02
    networks:
      test_net:
        ipv4_address: "172.40.0.21"

  cc-test-02:
    <<: *cc-base
    container_name: cc_test_02
    hostname: cc-test-02
    networks:
      test_net:
        ipv4_address: "172.40.0.11"
    environment:
      - DRONE_ID=honey_02
      - ENGINE_HOST=${ENGINE_HOST:-}
      - ENGINE_PORT=14552
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      fcu-test-02:
        condition: service_healthy

  # ═══ HONEY DRONE 03 ═══
  fcu-test-03:
    <<: *fcu-base
    container_name: fcu_test_03
    hostname: fcu-test-03
    networks:
      test_net:
        ipv4_address: "172.40.0.22"

  cc-test-03:
    <<: *cc-base
    container_name: cc_test_03
    hostname: cc-test-03
    networks:
      test_net:
        ipv4_address: "172.40.0.12"
    environment:
      - DRONE_ID=honey_03
      - ENGINE_HOST=${ENGINE_HOST:-}
      - ENGINE_PORT=14553
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      fcu-test-03:
        condition: service_healthy

  # ═══ Attacker Simulator ═══
  attacker-simulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.attacker
    container_name: mirage_attacker
    hostname: attacker
    networks:
      test_net:
        ipv4_address: "172.40.0.200"
    environment:
      - ATTACKER_LEVEL_DURATION_SEC=${ATTACKER_LEVEL_DURATION_SEC:-30}
      - HONEY_DRONE_TARGETS=172.40.0.10:14550,172.40.0.11:14550,172.40.0.12:14550
      - WEBCLAW_PORT_BASE=18789
      - HTTP_PORT_BASE=79
      - RESULTS_DIR=/results
    volumes:
      - ../results:/results:rw
    depends_on:
      cc-test-01:
        condition: service_healthy
      cc-test-02:
        condition: service_healthy
      cc-test-03:
        condition: service_healthy

networks:
  test_net:
    name: test_net
    driver: bridge
    ipam:
      config:
        - subnet: "172.40.0.0/24"
          gateway: "172.40.0.1"
